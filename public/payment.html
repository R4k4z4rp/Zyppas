<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pembayaran - ZyppaStore</title>
  <style>
    body { background:#0f0f1a; color:white; font-family:sans-serif; text-align:center; padding:40px; }
    .card { background:rgba(25,20,50,0.8); border-radius:20px; padding:40px; max-width:400px; margin:auto; }
    button { background:#7c3aed; border:none; padding:16px 40px; border-radius:30px; color:white; font-weight:700; cursor:pointer; font-size:1.1rem; margin:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>💳 ZyppaStore</h2>
    <p>Order ID: <strong id="orderIdDisplay"></strong></p>
    <p>Simulasi pembayaran:</p>
    <button onclick="simulate('settlement')">✅ Bayar Sukses</button>
    <button onclick="simulate('deny')">❌ Gagal</button>
    <div id="status"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    document.getElementById('orderIdDisplay').textContent = orderId;
    async function simulate(status) {
      document.getElementById('status').innerHTML = 'Memproses...';
      await fetch('/api/midtrans/notification', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ order_id: orderId, transaction_status: status })
      });
      document.getElementById('status').innerHTML = status === 'settlement' ? '✅ Sukses! Mengalihkan...' : '❌ Gagal';
      if (status === 'settlement') setTimeout(() => window.location.href = '/', 2000);
    }
  </script>
</body>
</html>
